site_name: Agent Harness Wiki
site_description: Interlinked markdown wiki on agent harnesses, orchestration, formal methods, and adjacent research.
site_url: https://ericfode.github.io/agent-harness-wiki/
repo_url: https://github.com/ericfode/agent-harness-wiki
repo_name: ericfode/agent-harness-wiki
docs_dir: .site-docs
site_dir: site
use_directory_urls: true

theme:
  name: mkdocs
  color_mode: dark
  user_color_mode_toggle: false
  nav_style: dark
  navigation_depth: 3
  hljs_style: github
  hljs_style_dark: github-dark

plugins:
  - search
  - mermaid2:
      arguments:
        theme: base
        startOnLoad: true
        securityLevel: loose
        flowchart:
          useMaxWidth: true
          curve: basis
        themeVariables:
          darkMode: true
          background: '#0f172a'
          primaryColor: '#1d4ed8'
          primaryTextColor: '#e2e8f0'
          primaryBorderColor: '#334155'
          lineColor: '#7dd3fc'
          tertiaryColor: '#111827'
          mainBkg: '#111827'
          secondBkg: '#0f172a'
          tertiaryBkg: '#1e293b'
          nodeBorder: '#475569'
          clusterBkg: '#0b1220'
          clusterBorder: '#334155'
          edgeLabelBackground: '#0f172a'
          textColor: '#dbe4f0'
          fontFamily: 'Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, sans-serif'

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true

extra_css:
  - assets/stylesheets/wiki.css
