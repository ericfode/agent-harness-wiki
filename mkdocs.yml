site_name: Agent Harness Wiki
site_description: Interlinked markdown wiki on agent harnesses, orchestration, formal methods, and adjacent research.
site_url: https://ericfode.github.io/agent-harness-wiki/
repo_url: https://github.com/ericfode/agent-harness-wiki
repo_name: ericfode/agent-harness-wiki
docs_dir: .site-docs
site_dir: site
use_directory_urls: true

theme:
  name: material
  features:
    - navigation.instant
    - navigation.sections
    - navigation.top
    - search.highlight
    - content.code.copy

plugins:
  - search
  - mermaid2

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/ericfode/agent-harness-wiki
