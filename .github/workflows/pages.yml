name: Publish wiki site

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: .quartz-site/package-lock.json

      - name: Prepare Quartz content tree
        run: python scripts/prepare_quartz_content.py

      - name: Install Quartz dependencies
        working-directory: .quartz-site
        run: npm ci

      - name: Build Quartz site
        working-directory: .quartz-site
        run: npx quartz build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: .quartz-site/public

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
